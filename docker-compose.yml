version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: langdb
      POSTGRES_PASSWORD: langdb
      POSTGRES_DB: langdb
    ports:
      - "5442:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langdb -d langdb"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
